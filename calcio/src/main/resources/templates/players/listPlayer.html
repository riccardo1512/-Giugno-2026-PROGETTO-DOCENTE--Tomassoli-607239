<!DOCTYPE html>
<html>
<head>
	<title>Giocatori</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Giocatori</h1>
	
	<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN'}" style="margin-bottom: 20px;">
		<a th:href="@{/admin/players/new}" class="btn-action">➕ Aggiungi Giocatore</a>
	</div>
	<div th:if="${players==null || players.isEmpty()}">Non ci sono giocatori nel sistema</div>
	<ul>
		<li th:each="player : ${players}">
			<a th:href="@{'/players' + '/' + ${player.id}}" th:text="${player.name} + ' ' + ${player.surname}">Nome Cognome</a>
		</li>
	</ul>
</body>
</html>
