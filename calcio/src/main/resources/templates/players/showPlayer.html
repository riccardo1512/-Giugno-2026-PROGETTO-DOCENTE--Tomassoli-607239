<!DOCTYPE html>
<html>
<head>
	<title>Dettagli Giocatore</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Dettagli Giocatore</h1>
	<div th:if="${player}">
		<div class="details-card">
			<h2 class="details-title" th:text="${player.name} + ' ' + ${player.surname}">Nome Cognome</h2>
			<div class="details-meta">
				<span th:text="'Nato il: ' + ${player.dateOfBirth}">01/01/2000</span>
				<span th:text="'Ruolo: ' + ${player.role}">Attaccante</span>
				<span th:text="'Altezza: ' + ${player.height} + ' cm'">180 cm</span>
			</div>
		</div>

		<div>
			<strong>Squadra:</strong> 
			<span th:if="${player.team}">
				<a th:href="@{'/teams/' + ${player.team.id}}" th:text="${player.team.name}">Nome Squadra</a>
			</span>
			<span th:unless="${player.team}">Svincolato</span>
		</div>

		<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN'}">
			<hr>
			<h3>Amministrazione</h3>
			<div class="admin-actions">
				<a class="btn-action" th:href="@{'/admin/players/' + ${player.id} + '/edit'}">Modifica Giocatore</a>
				<form th:action="@{'/admin/players/' + ${player.id} + '/delete'}" method="POST" style="display:inline;">
					<button type="submit" class="btn-danger" onclick="return confirm('Sei sicuro di voler eliminare questo giocatore?')">Elimina Giocatore</button>
				</form>
			</div>
		</div>

	</div>
	
	<div th:unless="${player}">Il giocatore richiesto non esiste.</div>
</body>
</html>
