<!DOCTYPE html>
<html>

<head>
	<title>Giocatori (React App)</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header>
		<div th:if="${userDetails}">
			<span th:text="${userDetails.username}"></span>
			<form th:action="@{/logout}" method="POST" style="display:inline;">
				<button type="submit">Logout</button>
			</form>
		</div>
    </header>
	<div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
	<h1>Directory Giocatori (Interattiva)</h1>
	
    <!-- Il "buco" dove React monterà l'applicazione -->
    <div id="react-players-root"></div>

    <!-- Passiamo i dati da Java a Javascript tramite JSON -->
    <script th:inline="javascript">
        window.SIW_PLAYERS_DATA = /*[[${players}]]*/ [];
    </script>
    
    <!-- Carichiamo il file compilato da Vite React -->
    <script type="module" th:src="@{/js/react/react-players.js}"></script>

</body>

</html>
