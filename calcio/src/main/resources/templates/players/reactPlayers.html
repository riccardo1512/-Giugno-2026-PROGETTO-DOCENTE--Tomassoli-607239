<!DOCTYPE html>
<html>

<head>
	<title>Giocatori (React App)</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Directory Giocatori (Interattiva)</h1>
	
    <!-- Il "buco" dove React monterà l'applicazione -->
    <div id="react-players-root"></div>

    <!-- Passiamo i dati da Java a Javascript tramite JSON -->
    <script th:inline="javascript">
        window.SIW_PLAYERS_DATA = /*[[${players}]]*/ [];
    </script>
    
    <!-- Carichiamo il file compilato da Vite React -->
    <script type="module" th:src="@{/js/react/react-players.js}"></script>

</body>

</html>
