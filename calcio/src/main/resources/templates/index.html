<!DOCTYPE html>
<html>
<head>
	<title>
		SiwCalcio - Homepage
	</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header>
		<div th:if="${userDetails}">
			<span th:text="${userDetails.username}"></span>
			<form th:action="@{/logout}" method="POST" style="display:inline;">
				<button type="submit">Logout</button>
			</form>
		</div>
		<div th:unless="${userDetails}">
			<a href="/login">Accedi</a> | <a href="/register">Registrati</a>
		</div>
    </header>
	
	<div><img src="/images/logo-siw.png" width="50%" /></div>
	<h1>Consulta</h1>

	<div>
		<a href="/tournaments">Tornei</a>
	</div>
	<div>
		<a href="/teams">Squadre</a>
	</div>
	<div>
		<a href="/players">Giocatori</a> | <a href="/players/react">Giocatori (React)</a>
	</div>
	<div>
		<a href="/matches">Partite</a>
	</div>
	<div>
		<a href="/referees">Arbitri</a>
	</div>

	<h2>Gestisci (riservato agli amministratori)</h2>
	<div>	
		<a href="/admin/index">Inserimenti e cancellazioni</a>
	</div>			
</body>
</html>
