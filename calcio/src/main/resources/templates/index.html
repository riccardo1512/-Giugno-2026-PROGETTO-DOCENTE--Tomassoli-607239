<!DOCTYPE html>
<html>
<head>
	<title>
		SiwCalcio - Homepage
	</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Area Consultazione</h1>

	<div class="home-grid">
		<a href="/tournaments" class="home-card">
			<span class="home-card-icon">🏆</span>
			<span class="home-card-title">Tornei</span>
		</a>
		<a href="/teams" class="home-card">
			<span class="home-card-icon">🛡️</span>
			<span class="home-card-title">Squadre</span>
		</a>
		<a href="/players" class="home-card">
			<span class="home-card-icon">🏃‍♂️</span>
			<span class="home-card-title">Giocatori</span>
		</a>
		<a href="/players/react" class="home-card">
			<span class="home-card-icon">⚛️</span>
			<span class="home-card-title">Giocatori (React)</span>
		</a>
		<a href="/matches" class="home-card">
			<span class="home-card-icon">⚽</span>
			<span class="home-card-title">Partite</span>
		</a>
		<a href="/referees" class="home-card">
			<span class="home-card-icon">🟨</span>
			<span class="home-card-title">Arbitri</span>
		</a>
	</div>

	<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN'}">
		<h2>Gestisci (Riservato agli Amministratori)</h2>
		<div class="home-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
			<a href="/admin/index" class="home-card" style="border-color: var(--primary-color);">
				<span class="home-card-icon">🛠️</span>
				<span class="home-card-title">Pannello Inserimenti e Cancellazioni</span>
			</a>
		</div>
	</div>
</body>
</html>
