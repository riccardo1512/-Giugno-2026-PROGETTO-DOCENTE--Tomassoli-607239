<!DOCTYPE html>
<html>
<head>
    <title>Nuovo Arbitro</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <h1>Aggiungi Arbitro</h1>
    <form th:action="@{/admin/referees}" method="POST" th:object="${referee}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" style="color:red">...</p>
        </div>
        <div>
            <label>Nome:</label> <input type="text" th:field="${referee.name}" required />
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>
        <div>
            <label>Cognome:</label> <input type="text" th:field="${referee.surname}" required />
            <span th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></span>
        </div>
        <div>
            <label>Codice Arbitro:</label> <input type="text" th:field="${referee.refereeCode}" />
            <span th:if="${#fields.hasErrors('refereeCode')}" th:errors="*{refereeCode}"></span>
        </div>
        <div><button type="submit">Salva</button></div>
    </form>
    <br>
    <a class="back-link" th:href="@{/admin/index}">🔙 Torna alla dashboard Admin</a>
</body>
</html>
