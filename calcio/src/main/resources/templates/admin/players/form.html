<!DOCTYPE html>
<html>
<head>
    <title>Nuovo Giocatore</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <h1>Aggiungi Giocatore</h1>
    <form th:action="@{/admin/players}" method="POST" th:object="${player}">
        <input type="hidden" th:field="*{id}" />
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" style="color:red">...</p>
        </div>
        <div>
            <label>Nome:</label> <input type="text" th:field="${player.name}" required />
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>
        <div>
            <label>Cognome:</label> <input type="text" th:field="${player.surname}" required />
            <span th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></span>
        </div>
        <div>
            <label>Data di Nascita:</label> <input type="date" th:field="${player.dateOfBirth}" />
            <span th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></span>
        </div>
        <div>
            <label>Ruolo:</label> 
            <select th:field="${player.role}" required>
                <option value="PORTIERE">Portiere</option>
                <option value="DIFENSORE">Difensore</option>
                <option value="CENTROCAMPISTA">Centrocampista</option>
                <option value="ATTACCANTE">Attaccante</option>
            </select>
            <span th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
        </div>
        <div>
            <label>Altezza (cm):</label> <input type="number" th:field="${player.height}" />
            <span th:if="${#fields.hasErrors('height')}" th:errors="*{height}"></span>
        </div>
        <div>
            <label>Squadra:</label>
            <select th:field="*{team}">
                <option value="">Nessuna squadra</option>
                <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name} + ' (' + ${t.city} + ')'">Squadra</option>
            </select>
        </div>
        <div><button type="submit">Salva</button></div>
    </form>
    <br>
    <a class="back-link" th:href="@{/admin/index}">🔙 Torna alla dashboard Admin</a>
</body>
</html>
