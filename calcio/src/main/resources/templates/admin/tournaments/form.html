<!DOCTYPE html>
<html>
<head>
    <title>Nuovo Torneo</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <h1>Aggiungi Torneo</h1>
    <form th:action="@{/admin/tournaments}" method="POST" th:object="${tournament}">
        <input type="hidden" th:field="*{id}" />
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" style="color:red">...</p>
        </div>
        <div>
            <label>Nome:</label> <input type="text" th:field="${tournament.name}" required />
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>
        <div>
            <label>Anno:</label> <input type="number" th:field="${tournament.year}" />
            <span th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></span>
        </div>
        <div>
            <label>Descrizione:</label> <textarea th:field="${tournament.description}"></textarea>
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
        </div>
        <div>
            <label>Squadre Iscritte:</label>
            <select multiple="multiple" th:field="*{teams}">
                <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name} + ' (' + ${t.city} + ')'">Squadra</option>
            </select>
            <small>(Tieni premuto CTRL o CMD per selezionare più squadre)</small>
        </div>
        <div><button type="submit">Salva</button></div>
    </form>
    <br>
    <a class="back-link" th:href="@{/admin/index}">🔙 Torna alla dashboard Admin</a>
</body>
</html>
