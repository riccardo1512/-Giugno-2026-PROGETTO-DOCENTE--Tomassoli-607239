<!DOCTYPE html>
<html>
<head>
	<title>
		SiwCalcio - Amministrazione
	</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Gestione</h1>
	<h2>(riservato agli amministratori)</h2>
	<div>	
		<ul>
			<li><a href="/admin/teams/new">Aggiungi Squadra</a></li>
			<li><a href="/admin/players/new">Aggiungi Giocatore</a></li>
			<li><a href="/admin/tournaments/new">Aggiungi Torneo</a></li>
			<li><a href="/admin/matches/new">Aggiungi Partita</a></li>
			<li><a href="/admin/referees/new">Aggiungi Arbitro</a></li>
		</ul>
	</div>			

</body>
</html>
