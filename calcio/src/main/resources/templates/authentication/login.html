<!DOCTYPE html>
<html>

<head>
	<title>
		SiwMovie - Login
	</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
	<header>
		<div th:if="${userDetails}">
			<span th:text="${userDetails.username}"></span>
			<form th:action="@{/logout}" method="POST" style="display:inline;">
				<button type="submit">Logout</button>
			</form>
		</div>
		<div th:unless="${userDetails}">
			<a href="/login">Login</a>
		</div>
	</header>

	<div>
		<a href="/"><img src="/images/logo_calcio.png" width="50%"/></a>
	</div>
	<h1>Login</h1>
	<form th:action="@{/login}" method="POST">
			<div>
				<span>Username:</span>
				<span><input name="username" type="text" required /></span>
			</div>
			<div>
				<span>Password:</span>
				<span><input name="password" type="password" required /></span>
			</div>
			<div>
				<span th:if="${param.error != null}">Username o password errati</span>
			</div>
			<div>
				<span><button type="submit">Login</button></span>
			</div>
	</form>
	
	<div style="text-align: center; margin-top: 20px; max-width: 900px; margin-left: auto; margin-right: auto; padding-left: 20px; padding-right: 20px;">
		<p style="margin-bottom: 10px; color: dimgray;">Oppure accedi tramite i provider esterni:</p>
		<div style="display: flex; gap: 10px; justify-content: center;">
			<a th:href="@{/oauth2/authorization/google}" style="background-color: #db4437; color: white; padding: 10px 20px; border-radius: 4px; font-weight: bold; text-decoration: none;">Accedi con Google</a>
			<a th:href="@{/oauth2/authorization/github}" style="background-color: #333333; color: white; padding: 10px 20px; border-radius: 4px; font-weight: bold; text-decoration: none;">Accedi con GitHub</a>
		</div>
	</div>

	<div style="text-align: center; margin-top: 30px;">
		<a th:href="@{/register}" th:text="Registrati">Registrati</a>
	</div>
</body>

</html>
