<!DOCTYPE html>
<html>
<head>
	<title>Dettagli Partita</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
	<div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
	<h1>Dettagli Partita</h1>
	<div th:if="${match}">

		<h2>
			<a th:href="@{'/teams/' + ${match.teamHome.id}}" th:text="${match.teamHome.name}">Squadra Casa</a>
			<span th:if="${match.state.name() != 'PLAYED'}"> vs </span>
			<span th:if="${match.state.name() == 'PLAYED'}" th:text="' ' + ${match.goalsHome} + ' - ' + ${match.goalsAway} + ' '"> 0 - 0 </span>
			<a th:href="@{'/teams/' + ${match.teamAway.id}}" th:text="${match.teamAway.name}">Squadra Ospite</a>
		</h2>

		<div>
			<strong>Torneo:</strong> 
			<span th:if="${match.tournament}">
				<a th:href="@{'/tournaments/' + ${match.tournament.id}}" th:text="${match.tournament.name}">Torneo</a>
			</span>
		</div>
		<div>
			<strong>Data e Ora:</strong> <span th:text="${match.date} + ' alle ' + ${match.time}">01/01/2025 20:45</span>
		</div>
		<div>
			<strong>Stato:</strong> <span th:text="${match.state}">PROGRAMMATA</span>
		</div>
		<div>
			<strong>Arbitro:</strong> 
			<span th:if="${match.referee}">
				<a th:href="@{'/referees/' + ${match.referee.id}}" th:text="${match.referee.name} + ' ' + ${match.referee.surname}">Nome Arbitro</a>
			</span>
		</div>

		<div th:if="${userDetails != null}">
			<hr>
			<h3>Amministrazione</h3>
			<a th:href="@{'/admin/matches/' + ${match.id} + '/edit'}">Modifica Risultato/Partita</a>
			<form th:action="@{'/admin/matches/' + ${match.id} + '/delete'}" method="POST" style="display:inline;">
				<button type="submit" onclick="return confirm('Sei sicuro di voler eliminare questa partita?')">Elimina Partita</button>
			</form>
		</div>

	</div>
	
	<div th:unless="${match}">La partita richiesta non esiste.</div>
</body>
</html>
