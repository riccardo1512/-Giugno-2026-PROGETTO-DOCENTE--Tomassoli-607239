<!DOCTYPE html>
<html>

<head>
	<title>Elenco Arbitri</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Elenco Arbitri</h1>
	
	<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN'}" style="margin-bottom: 20px;">
		<a th:href="@{/admin/referees/new}" class="btn-action">➕ Aggiungi Arbitro</a>
	</div>
	
	<div th:if="${not #lists.isEmpty(referees)}">
		<ul>
			<li th:each="referee : ${referees}">
				<a th:href="@{'/referees' + '/' + ${referee.id}}" th:text="${referee.name} + ' ' + ${referee.surname} + ' (' + ${referee.refereeCode} + ')'">Nome Arbitro</a>
			</li>
		</ul>
	</div>
	
	<div th:if="${#lists.isEmpty(referees)}">
		Nessun arbitro registrato nel sistema.
	</div>
	
</body>

</html>
