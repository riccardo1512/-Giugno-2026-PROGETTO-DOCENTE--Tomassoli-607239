<!DOCTYPE html>
<html>

<head>
	<title>Dettagli Arbitro</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Dettagli Arbitro</h1>
	
	<div th:if="${referee}">
		<div class="details-card">
			<h2 class="details-title" th:text="${referee.name} + ' ' + ${referee.surname}">Nome Cognome</h2>
			<div class="details-meta">
				<span th:text="'Codice: ' + ${referee.refereeCode}">Codice</span>
			</div>
		</div>

	<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN' and referee != null}">
		<hr>
		<h3>Amministrazione</h3>
		<div class="admin-actions">
			<a class="btn-action" th:href="@{'/admin/referees/' + ${referee.id} + '/edit'}">Modifica Arbitro</a>
			<form th:action="@{'/admin/referees/' + ${referee.id} + '/delete'}" method="POST" style="display:inline;">
				<button type="submit" class="btn-danger" onclick="return confirm('Sei sicuro di voler eliminare questo arbitro?')">Elimina Arbitro</button>
			</form>
		</div>
	</div>
	
	<div th:unless="${referee}">
		L'arbitro richiesto non esiste.
	</div>
	
	</div>
</body>

</html>
