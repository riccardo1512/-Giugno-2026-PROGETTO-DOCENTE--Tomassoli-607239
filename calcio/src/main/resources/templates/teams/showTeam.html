<!DOCTYPE html>
<html>

<head>
	<title>Team</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header>
		<div th:if="${userDetails}">
			<span th:text="${userDetails.username}"></span>
			<form th:action="@{/logout}" method="POST" style="display:inline;">
				<button type="submit">Logout</button>
			</form>
		</div>
    </header>
	<div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
	<h1>Dettagli Team</h1>
	<div th:if="${team}">

		<span th:text="${team.name}">Roma</span>

		<span th:text="'(' + ${team.yearOfFoundation} + ')'">2000</span>

		<span th:text="'(' + ${team.city} + ')'">Acilia</span>

		<!-- <span><img width="5%" th:src="${team.urlImage}" alt="Immagine della squadra" /></span> -->

		<!-- 
		<div>
			<strong>:</strong> 
			<span th:if="${movie.director}" th:text="${movie.director.name}">Nome regista</span>
			<span th:unless="${movie.director}">Non specificato</span>
		</div> -->


		<div>
			<strong>Giocatori:</strong>
			<ul th:if="${not #lists.isEmpty(team.players)}">
				<li th:each="player : ${team.players}">
					<a th:href="@{'/players' + '/' + ${player.id}}" th:text="${player.name} + ' ' + ${player.surname}">Nome Cognome</a>
				</li>
			</ul>
			<span th:if="${#lists.isEmpty(team.players)}">Nessun player specificato</span>
		</div>

		<div>
			<strong>Partite in casa:</strong>
			<ul th:if="${not #lists.isEmpty(team.matchesHome)}">
				<li th:each="match : ${team.matchesHome}">
					<a th:href="@{'/matches/' + ${match.id}}">
						<span th:if="${match.state.name() != 'PLAYED'}" th:text="${match.teamHome.name} + ' vs ' + ${match.teamAway.name}">Roma vs Lazio</span>
						<span th:if="${match.state.name() == 'PLAYED'}" th:text="${match.teamHome.name} + ' ' + ${match.goalsHome} + ' - ' + ${match.goalsAway} + ' ' + ${match.teamAway.name}">Roma 3 - 1 Lazio</span>
					</a>
					<span th:text="' (' + ${match.date} + ')'"></span>
				</li>
			</ul>
			<span th:if="${#lists.isEmpty(team.matchesHome)}">Nessuna partita in casa.</span>
		</div>

		<div>
			<strong>Partite fuori casa:</strong>
			<ul th:if="${not #lists.isEmpty(team.matchesAway)}">
				<li th:each="match : ${team.matchesAway}">
					<a th:href="@{'/matches/' + ${match.id}}">
						<span th:if="${match.state.name() != 'PLAYED'}" th:text="${match.teamHome.name} + ' vs ' + ${match.teamAway.name}">Roma vs Lazio</span>
						<span th:if="${match.state.name() == 'PLAYED'}" th:text="${match.teamHome.name} + ' ' + ${match.goalsHome} + ' - ' + ${match.goalsAway} + ' ' + ${match.teamAway.name}">Roma 3 - 1 Lazio</span>
					</a>
					<span th:text="' (' + ${match.date} + ')'"></span>
				</li>
			</ul>
			<span th:if="${#lists.isEmpty(team.matchesAway)}">Nessuna partita fuori casa.</span>
		</div>


		
		<div th:if="${userDetails != null}">
			<hr>
			<h3>Amministrazione</h3>
			<a th:href="@{'/admin/teams/' + ${team.id} + '/edit'}">Modifica Squadra</a>
			<form th:action="@{'/admin/teams/' + ${team.id} + '/delete'}" method="POST" style="display:inline;">
				<button type="submit" onclick="return confirm('Sei sicuro di voler eliminare questa squadra?')">Elimina Squadra</button>
			</form>
		</div>
		
	</div>
	
	<div th:unless="${team}">Non esiste</div>
</body>

</html>
