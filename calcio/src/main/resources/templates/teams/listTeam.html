<!DOCTYPE html>
<html>

<head>
	<title>Teams</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo_calcio.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
	<h1>Squadre</h1>
	
	<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN'}" style="margin-bottom: 20px;">
		<a th:href="@{/admin/teams/new}" class="btn-action">➕ Aggiungi Squadra</a>
	</div>
	<div th:if="${teams==null || teams.isEmpty()}">Non ci sono team nel sistema</div>
	<ul style="list-style-type: none; padding: 0;">
		<li th:each="team : ${teams}" style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
			<img th:if="${team.logo != null}" th:src="${team.logo}" alt="Logo" style="width: 40px; height: 40px; object-fit: contain; border-radius: 5px;" />
			<div th:unless="${team.logo != null}" style="width: 40px; height: 40px; background-color: #eee; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #aaa;">N/A</div>
			<a th:href="@{'/teams' + '/' + ${team.id}}" th:text="${team.name}" style="font-weight: bold; font-size: 1.2rem;">nome</a>
		</li>
	</ul>
</body>

</html>
