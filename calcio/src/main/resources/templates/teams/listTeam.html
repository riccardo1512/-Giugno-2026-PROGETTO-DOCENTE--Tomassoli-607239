<!DOCTYPE html>
<html>

<head>
	<title>Teams</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header>
		<div th:if="${userDetails}">
			<span th:text="${userDetails.username}"></span>
			<form th:action="@{/logout}" method="POST" style="display:inline;">
				<button type="submit">Logout</button>
			</form>
		</div>
    </header>
	<div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
	<h1>Squadre</h1>
	<div th:if="${userDetails != null and userDetails.authorities[0].authority == 'ADMIN'}" style="margin-bottom: 20px;">
		<a href="/admin/teams/new" style="background-color: #4CAF50; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px;">Aggiungi Squadra</a>
	</div>
	<div th:if="${teams==null || teams.isEmpty()}">Non ci sono team nel sistema</div>
	<ul>
		<li th:each="team : ${teams}">
			<a th:href="@{'/teams' + '/' + ${team.id}}" th:text="${team.name}">nome</a>
		</li>
	</ul>
</body>

</html>
